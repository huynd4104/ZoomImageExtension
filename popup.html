<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      width: 200px;
      font-family: Arial, sans-serif;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f4f4f9;
    }

    h3 {
      margin-top: 5px;
      margin-bottom: 15px;
      color: #333;
      text-align: center;
    }

    .switch-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* The switch - the box around the slider */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    /* Hide default HTML checkbox */
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    /* The slider */
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
    }

    input:checked+.slider {
      background-color: #4CAF50;
    }

    input:focus+.slider {
      box-shadow: 0 0 1px #4CAF50;
    }

    input:checked+.slider:before {
      transform: translateX(26px);
    }

    /* Rounded sliders */
    .slider.round {
      border-radius: 24px;
    }

    .slider.round:before {
      border-radius: 50%;
    }

    .status-text {
      font-weight: bold;
      color: #555;
    }
  </style>
</head>

<body>
  <h3>Magnify Image</h3>
  <div class="switch-container">
    <label class="switch">
      <input type="checkbox" id="toggleSwitch" checked>
      <span class="slider round"></span>
    </label>
    <span class="status-text" id="statusText">ON</span>
  </div>
  <hr style="width: 80%; border: 0; border-top: 1px solid #ccc; margin: 15px 0;" />
  <h3 style="font-size: 14px; margin-bottom: 8px;">Gallery Mode</h3>
  <div class="switch-container">
    <label class="switch">
      <input type="checkbox" id="galleryToggleSwitch" checked>
      <span class="slider round"></span>
    </label>
    <span class="status-text" id="galleryStatusText">ON</span>
  </div>
  <script src="popup.js"></script>
</body>

</html>
